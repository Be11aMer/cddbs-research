name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jsonschema nbformat

      - name: Validate JSON schemas
        run: |
          python -c "
          import json, sys, glob
          errors = 0
          for f in glob.glob('schemas/*.json'):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'OK: {f}')
              except json.JSONDecodeError as e:
                  print(f'FAIL: {f} - {e}')
                  errors += 1
          sys.exit(errors)
          "

      - name: Validate Jupyter notebooks
        run: |
          python -c "
          import nbformat, sys, glob
          errors = 0
          for f in glob.glob('research/*.ipynb'):
              try:
                  with open(f) as fh:
                      nbformat.read(fh, as_version=4)
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f} - {e}')
                  errors += 1
          sys.exit(errors)
          "

      - name: Validate briefing schema structure
        run: |
          python -c "
          import json
          from jsonschema import Draft7Validator

          with open('schemas/briefing_v1.json') as f:
              schema = json.load(f)

          Draft7Validator.check_schema(schema)
          print('Schema is valid JSON Schema Draft 7')

          required_top = schema.get('required', [])
          expected = ['metadata', 'executive_summary', 'key_findings', 'subject_profile', 'confidence_assessment']
          for field in expected:
              assert field in required_top, f'Missing required field: {field}'
              print(f'OK: required field \"{field}\" present')

          print('All schema validations passed')
          "

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          for f in README.md templates/intelligence_briefing.md docs/sprint_1_quickstart.md docs/cddbs_execution_plan.md; do
            if [ -f "$f" ]; then
              echo "OK: $f exists"
            else
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Check for broken internal links
        run: |
          python3 -c "
          import re, os, sys
          errors = 0
          for root, dirs, files in os.walk('.'):
              for fname in files:
                  if not fname.endswith('.md'):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath) as f:
                      content = f.read()
                  links = re.findall(r'\[.*?\]\(((?!http)[^)]+)\)', content)
                  for link in links:
                      target = os.path.normpath(os.path.join(root, link))
                      if not os.path.exists(target):
                          print(f'BROKEN: {fpath} -> {link}')
                          errors += 1
                      else:
                          print(f'OK: {fpath} -> {link}')
          sys.exit(errors)
          "
